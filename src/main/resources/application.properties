server.port=8081
spring.application.name=Camera _Surveillance _System

# ================== DATABASE ==================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.liquibase.change-log=classpath:db/changelog/changelog-master.sql
spring.liquibase.enabled=false

# ================== AI CONFIGURATION ==================
# YOLOv8 Model
ai.yolo.model.path=models/yolov8n.onnx
ai.yolo.model.type=yolov8
ai.yolo.model.version=8n
ai.yolo.confidence.threshold=0.5
ai.yolo.nms.threshold=0.4
ai.yolo.input.size=640

# Detection Filter - Chỉ phát hiện người và xe cộ
ai.yolo.detection-filter.enable-filter=true
ai.yolo.detection-filter.allowed-classes=person,bicycle,car,motorcycle,bus,train,truck

# Video Processing
ai.video.fps=5
ai.video.output-path=output/videos
ai.video.save-detection-video=false
ai.video.max-duration=3600

# Processing Configuration
ai.processing.thread-pool-size=4
ai.processing.queue-capacity=100
ai.processing.batch-size=10
ai.processing.enable-async=true

# ================== OPENAI CONFIGURATION (OPTIONAL) ==================
# Enable/Disable OpenAI integration for behavior analysis
ai.openai.enabled=false

# OpenAI API Key (Get from https://platform.openai.com/api-keys)
ai.openai.api-key=${OPENAI_API_KEY:}

# Model configuration
ai.openai.model=gpt-4
ai.openai.max-tokens=300
ai.openai.temperature=0.7

# When to use OpenAI (if enabled)
ai.openai.use-for-verification=false
ai.openai.use-for-description=false
ai.openai.use-for-anomaly-detection=false

# Filtering - Only analyze important events
ai.openai.min-confidence-trigger=0.8
ai.openai.process-every-n-frames=300

# ================== SWAGGER/OPENAPI CONFIGURATION ==================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# ================== BACKUP CONFIGURATION ==================
backup.directory=backups
backup.files.directory=uploads
backup.auto-backup-enabled=false
backup.auto-backup-cron=0 0 2 * * ?
backup.retention-days=30

# ================== SCHEDULING CONFIGURATION ==================
spring.task.scheduling.pool.size=2

# ================== MEDIAMTX CONFIGURATION ==================
# MediaMTX chạy qua Docker (docker-compose.yml)
mediamtx.enabled=true
# REST API để BE đăng ký/xóa stream
mediamtx.api.url=http://localhost:9997
# RTSP relay - BE push stream vào đây
mediamtx.rtsp.url=rtsp://localhost:8554
# HLS - Frontend dùng để phát video
mediamtx.hls.url=http://localhost:8888
# WebRTC - Frontend dùng khi cần low-latency
mediamtx.webrtc.url=http://localhost:8889
# Low-latency stream profile: false = keep source always on (faster startup)
mediamtx.source-on-demand=false
# Pattern URL HLS cho frontend: {hls.url}/{cameraCode}/index.m3u8
# Ví dụ: http://localhost:8888/CAM-001/index.m3u8

# ================== PTZ ONVIF CONFIGURATION ==================
# Mặc định ONVIF Device Service cho Tapo C220 là cổng 2020
ptz.onvif.url-template=http://%s:2020/onvif/device_service
# Timeout mỗi lệnh ONVIF (ms)
ptz.onvif.request-timeout-ms=6000

# ================== EMAIL CONFIGURATION ==================
# Load from .env file
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================== NOTE ==================
# To use Gmail:
# 1. Go to Google Account -> Security -> 2-Step Verification
# 2. Create "App Password" (16 characters)
# 3. Update MAIL_USERNAME and MAIL_PASSWORD in .env file
# 
# Alternative providers in .env:
# - Outlook: MAIL_HOST=smtp.office365.com
# - Yahoo: MAIL_HOST=smtp.mail.yahoo.com
